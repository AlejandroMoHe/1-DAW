<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 2</title>
    <script src="ej2.js" defer></script>
</head>
<body>
    <h1>Ejercicio 2 </h1>
    <br>
    <p>Introduce los datos del viaje y calcule el consumo (L/100km) y el coste total</p>
    <br>
    <form id="formulario">
        <label for="km">Kilómetros recorridos(km)</label>
        <input type="number" id="km" placeholder="Ej: 185.5" step="0.01">
        <br>
        <label for="litro">Litros consumidos(L)</label>
        <input type="number" id="litro" placeholder="Ej: 12.30" step="0.01">
        <br>
        <label for="precio">Precio por litro(€)</label>
        <input type="number" id="precio" placeholder="Ej: 1.679" step="0.01">
        <br>
        <button type="submit">Calcular</button>
    </form>
    <p id="consumo">Consumo: </p>
    <p id="coste">Coste total: </p>
</body>
</html>
